<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SENSTACK OS — Persistent Broadcast Control Tower</title>

<style>
body {
  margin: 0;
  font-family: Inter, Arial;
  background: #0D0D0D;
  color: #F0EDE6;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  padding: 12px;
  width: 240px;
  margin: 6px;
  border-radius: 6px;
  border: none;
  text-align: center;
}

button {
  padding: 12px;
  width: 240px;
  margin: 6px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #C8963E;
  font-weight: bold;
}

/* APP */
#app { display:none; }

header {
  padding: 18px;
  border-bottom: 1px solid #2A2A2A;
  display:flex;
  justify-content:space-between;
}

h1 {
  margin: 0;
  color: #C8963E;
  font-family: Georgia;
}

.badge {
  background:#C8963E;
  color:black;
  padding:4px 8px;
  border-radius:4px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#141414;
  border:1px solid #2A2A2A;
  padding:15px;
  border-radius:10px;
}

.status {
  margin-top:10px;
  padding:10px;
  background:#111;
  border-left:4px solid #C8963E;
  font-size:13px;
}

button.ctrl {
  width:100%;
  margin:5px 0;
}

.onair { background:#C8963E; color:black; }
.offair { background:#2A2A2A; color:white; }

.logbox {
  height:120px;
  overflow:auto;
  font-size:12px;
  background:#0f0f0f;
  padding:10px;
  border:1px solid #2A2A2A;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2 style="color:#C8963E;">SENSTACK OS LOGIN</h2>
  <input id="pin" placeholder="Enter Access PIN" />
  <button onclick="login()">ENTER SYSTEM</button>
</div>

<!-- APP -->
<div id="app">

<header>
  <h1>SENSTACK OS</h1>
  <div class="badge" id="roleBadge"></div>
</header>

<div class="grid">

  <!-- CONTROL -->
  <div class="card">
    <h3>🎛 OPERATOR</h3>

    <button class="ctrl onair" onclick="setState('ON AIR')">ON AIR</button>
    <button class="ctrl offair" onclick="setState('OFF AIR')">OFF AIR</button>

    <div class="status" id="stateBox"></div>
  </div>

  <!-- DJ -->
  <div class="card">
    <h3>🎧 DJ MODE</h3>

    <button onclick="setDJ('AUTO DJ')">AUTO DJ</button>
    <button onclick="setDJ('LIVE DJ')">LIVE DJ</button>

    <div class="status" id="djBox"></div>
  </div>

  <!-- STREAM -->
  <div class="card">
    <h3>📡 STREAM</h3>
    <a href="https://listen.streamaudio.co/proxy/stvradio/stream" target="_blank">Live Stream</a>
  </div>

  <!-- LOG -->
  <div class="card">
    <h3>🧭 SYSTEM LOG</h3>
    <div class="logbox" id="logBox"></div>
    <button onclick="clearLog()">CLEAR LOG</button>
  </div>

</div>

</div>

<script>
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
  broadcast: "STANDBY",
  dj_mode: "AUTO DJ",
  role: "GUEST"
};

/* --------------------------
   LOAD INITIAL STATE
-------------------------- */

async function loadState() {
  let { data } = await sb
    .from("system_state")
    .select("*")
    .eq("id", "global")
    .single();

  if (data) {
    state = {
      broadcast: data.broadcast,
      dj_mode: data.dj_mode,
      role: data.role
    };
  }

  render();
}

/* --------------------------
   UPDATE STATE (WRITE)
-------------------------- */

async function updateState(partial) {
  state = { ...state, ...partial };

  await sb
    .from("system_state")
    .update({
      broadcast: state.broadcast,
      dj_mode: state.dj_mode,
      role: state.role,
      updated_at: new Date()
    })
    .eq("id", "global");

  await sb.from("system_logs").insert({
    message: JSON.stringify(partial)
  });
}

/* --------------------------
   REAL-TIME LISTENER
-------------------------- */

sb
  .channel("system-realtime")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "system_state"
    },
    (payload) => {
      const newData = payload.new;

      state.broadcast = newData.broadcast;
      state.dj_mode = newData.dj_mode;
      state.role = newData.role;

      render();
  })
  .subscribe();

/* --------------------------
   ACTIONS
-------------------------- */

function setState(val) {
  updateState({ broadcast: val });
}

function setDJ(val) {
  updateState({ dj_mode: val });
}

/* --------------------------
   LOGIN (simple role gate)
-------------------------- */

function login() {
  const pin = document.getElementById("pin").value;

  let role = "GUEST";
  if (pin === "DJ404") role = "DJ";
  if (pin === "ADMIN999") role = "ADMIN";

  updateState({ role });
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadState();
}

/* --------------------------
   RENDER UI
-------------------------- */

function render() {
  document.getElementById("stateBox").innerText =
    "Broadcast: " + state.broadcast;

  document.getElementById("djBox").innerText =
    "Mode: " + state.dj_mode;

  document.getElementById("roleBadge").innerText =
    state.role;
}

/* --------------------------
   INIT
-------------------------- */

loadState();
</script>

</body>
</html>
